# shelterflex-contracts  ->  .github/workflows/ci.yml
#
# The toolchain, components and target come from rust-toolchain.toml, which
# rustup installs automatically on the first cargo invocation. There is no
# separate setup step, and CI uses the same compiler as contributors do locally.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Tests
        run: cargo test --workspace
